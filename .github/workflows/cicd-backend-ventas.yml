name: CI/CD Backend Ventas - SpringBoot

# Se activa SOLO cuando hay push en la rama deploy
on:
  push:
    branches:
      - deploy

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── PASO 1: Descargar el código ──────────────────────
      - name: "1. Checkout del codigo"
        uses: actions/checkout@v4

      # ── PASO 2: Login a Docker Hub ───────────────────────
      - name: "2. Login a Docker Hub"
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── PASO 3: Construir imagen Docker ──────────────────
      - name: "3. Build de la imagen Docker"
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/backend-ventas:latest ./Springboot-API-REST

      # ── PASO 4: Subir imagen a Docker Hub ────────────────
      - name: "4. Push imagen a Docker Hub"
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/backend-ventas:latest

      # ── PASO 5: Desplegar en EC2-App via SSH Jump ────────
      - name: "5. Deploy en EC2-App via SSH Jump"
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:           ${{ secrets.EC2_APP_HOST }}
          username:       ${{ secrets.EC2_USER }}
          key:            ${{ secrets.EC2_SSH_KEY }}
          proxy_host:     ${{ secrets.EC2_BASTION_HOST }}
          proxy_username: ${{ secrets.EC2_USER }}
          proxy_key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/backend-ventas:latest
            docker stop backend-ventas || true
            docker rm backend-ventas || true
            docker run -d \
              --name backend-ventas \
              --restart always \
              -p 8080:8080 \
              -e SPRING_DATASOURCE_URL="jdbc:mysql://${{ secrets.DB_HOST }}:3306/ventas_db?useSSL=false&allowPublicKeyRetrieval=true" \
              -e SPRING_DATASOURCE_USERNAME=appuser \
              -e SPRING_DATASOURCE_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              -e SPRING_JPA_HIBERNATE_DDL_AUTO=update \
              -e SERVER_PORT=8080 \
              ${{ secrets.DOCKERHUB_USERNAME }}/backend-ventas:latest